squad:
  code: luqz-design
  name: LUQZ Design Squad
  icon: 🎨
  version: "2.0"
  updated: "2026-04-20"
  description: >
    Pipeline profissional de criação visual para SaaS e agência.
    Motor principal: Claude Design. Motor de imagem 4K: nano-banana-2.
    Execução final: Canva MCP. QA visual dedicado antes de Vera.

  motor_principal: claude-design
  postura: sistema de produção — não designer freelancer

agents:
  - id: leo-creative-director
    file: agents/leo-creative-director.agent.md
    role: "Diretor Criativo — conceito, sistema visual, briefing técnico"

  - id: ivo-visual-prompter
    file: agents/ivo-visual-prompter.agent.md
    role: "Prompt Engineer Visual — traduz direção em prompts Claude Design / nano-banana-2"

  - id: caetano-layout
    file: agents/caetano-layout.agent.md
    role: "Layout Executor — montagem final no Canva com assets gerados"

  - id: nina-qa-visual
    file: agents/nina-qa-visual.agent.md
    role: "QA Visual — valida consistência, hierarquia e padrão de marca"

pipeline:
  file: pipeline/pipeline.yaml
  steps:
    - briefing-entrada
    - conceito-visual
    - prompt-engineering
    - geracao-assets
    - montagem-layout
    - qa-visual
    - entrega

integration:
  upstream:
    - luqz-estrategia   # Estela entrega estratégia e fase
    - luqz-demanda      # Clara entrega copy final aprovado
  downstream:
    - luqz-inteligencia # Vera veredicto final de negócio
    - luqz-documentacao # Davi publica no ClickUp

rules:
  - Claude Design é o motor padrão de geração visual
  - nano-banana-2 apenas para sujeitos consistentes (pessoas reais, 4K, transparência)
  - image-ai-generator apenas para testes de conceito (nunca entrega final)
  - Canva é ferramenta de composição — não de geração
  - Nenhum asset sai do squad sem Nina aprovar
  - Nenhum entregável vai ao ClickUp sem Davi Docs
