server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    types {
        text/html                             html;
        application/javascript                js mjs;
        text/css                              css;
        image/png                             png;
        image/svg+xml                         svg;
        application/json                      json;
        font/woff2                            woff2;
    }
}
