<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUQZ Post 01 - Render</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --text-primary: #FFFFFF;
            --text-secondary: #A1A1AA;
            --accent-color: #3B82F6;
            --border-color: #27272A;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            width: 1080px;
            height: 1350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 100px;
            overflow: hidden;
        }

        .container {
            width: 100%;
            height: 100%;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            padding: 80px;
        }

        /* Subtle grid background */
        .grid {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--border-color) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,1), rgba(0,0,0,0.2));
            pointer-events: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 32px;
            letter-spacing: -1px;
        }

        .logo span {
            color: var(--accent-color);
        }

        .category {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .content {
            z-index: 10;
        }

        .headline {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 92px;
            line-height: 1.1;
            margin-bottom: 40px;
            letter-spacing: -3px;
        }

        .headline .highlight {
            color: var(--accent-color);
        }

        .subheadline {
            font-size: 32px;
            line-height: 1.5;
            color: var(--text-secondary);
            max-width: 800px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
        }

        .cta {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--accent-color);
            color: #000;
            font-weight: 700;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 4px;
        }

        .url {
            font-size: 18px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        /* Accent corner */
        .accent-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 100px;
            height: 1px;
            background: var(--accent-color);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="grid"></div>
        <div class="accent-corner"></div>
        
        <header class="header">
            <div class="logo">LUQZ<span>.</span></div>
            <div class="category">Arquitetura de Performance</div>
        </header>

        <main class="content">
            <h1 class="headline">O seu CPL de R$ 2,00 está <span class="highlight">custando muito caro.</span></h1>
            <p class="subheadline">No B2B, leads baratos costumam ser o caminho mais rápido para o desperdício de caixa operacional.</p>
        </main>

        <footer class="footer">
            <div class="url">luqz.com.br</div>
            <div class="cta">Agende seu Diagnóstico</div>
        </footer>
    </div>
</body>
</html>
