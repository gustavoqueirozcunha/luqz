<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template Reference 1080x1350</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --dark: #101010;
            --light: #F9F9F9;
            --accent: #0066FF;
        }

        body {
            margin: 0;
            background-color: #333; /* For preview outside */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 1080x1350 REAL RESOLUTION */
        .template-base {
            width: 1080px;
            height: 1350px;
            background-color: var(--dark);
            color: var(--light);
            font-family: 'Inter', sans-serif;
            position: relative;
            box-sizing: border-box;
            padding: 120px 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow: hidden;
        }

        h1 {
            font-weight: 700;
            font-size: 64px;
            line-height: 1.15;
            margin: 0 0 50px 0;
            letter-spacing: -0.03em;
        }

        p {
            font-weight: 400;
            font-size: 34px;
            line-height: 1.4;
            margin: 0;
            opacity: 0.85;
        }

        .highlight {
            color: var(--accent);
        }

        /* Background Pattern Decoration */
        .grid-pattern {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: 80px 80px;
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            z-index: 0;
            pointer-events: none;
        }

        .content {
            position: relative;
            z-index: 10;
        }

    </style>
</head>
<body>

<div class="template-base">
    <div class="grid-pattern"></div>
    <div class="content">
        <h1>Este é o referencial absoluto para a<br/><span class="highlight">tipografia do carrossel.</span></h1>
        <p>O foco em mensagens curtas entre 10 e 25 palavras permite que fontes de 34px sejam lidas com claridade em dispositivos móveis. A ausência massiva de elementos concorrentes caracteriza a elegância de empresas da escola Apple e Linear.</p>
    </div>
</div>

</body>
</html>
